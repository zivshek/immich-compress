services:
  immich-compress:
    build: .
    container_name: immich_compress
    restart: unless-stopped
    ports:
      - "8097:8097"
    environment:
      # Use a URL this container can reach. If the container is not attached to
      # Immich's Docker network, use your LAN URL, for example:
      # IMMICH_URL: "http://192.168.1.50:2283"
      IMMICH_URL: "http://immich-server:2283"
      IMMICH_API_KEY: "${IMMICH_COMPRESS_API_KEY}"
      IMMICH_UPLOAD_ROOT: "/immich-upload"
      PROCESSED_SUFFIX: "-hbed"
      HANDBRAKE_PRESET: "Fast 2160p60 4K HEVC"
      HANDBRAKE_ENCODER: "nvenc_h265"
      DRY_RUN: "true"
      REPLACEMENT_MODE: "review"
    volumes:
      - ./immich-compress-data:/data
      - ${UPLOAD_LOCATION}:/immich-upload

    # NVIDIA NVENC: requires NVIDIA drivers and NVIDIA Container Toolkit on the host.
    # gpus: all

    # Intel QSV / VAAPI:
    # devices:
    #   - /dev/dri:/dev/dri
