services:
  immich-compress:
    build: .
    container_name: immich_compress
    restart: unless-stopped
    ports:
      - "8097:8097"
    environment:
      IMMICH_UPLOAD_ROOT: "/immich-upload"
      # Connection and compression settings are configured in the web UI.
    volumes:
      - ./immich-compress-data:/data
      - ${UPLOAD_LOCATION}:/immich-upload

    # NVIDIA NVENC: requires NVIDIA drivers and NVIDIA Container Toolkit on the host.
    # gpus: all

    # Intel QSV / VAAPI: choose the matching encoder in Settings.
    # devices:
    #   - /dev/dri:/dev/dri
