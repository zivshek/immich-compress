{% extends "base.html" %}
{% block content %}
<section>
  <h1>Settings</h1>
  {% if message %}<p class="notice">{{ message }}</p>{% endif %}
  <form method="post" class="settings-form">
    <fieldset>
      <legend>Immich Connection</legend>
      <label>
        Immich URL
        <input name="immich_url" type="url" value="{{ settings.immich_url }}" placeholder="http://192.168.1.50:2283" required>
        <small>Address this container can use to reach Immich. A LAN address is usually simplest for standalone deployments.</small>
      </label>
      <label>
        API Key
        <input name="immich_api_key" type="password" value="" placeholder="{{ 'Configured - leave blank to keep' if settings.immich_api_key else 'Paste an Immich API key' }}" autocomplete="new-password">
        <small>Used to read, upload, copy metadata, and trash original assets. New keys are stored in the app database under /data; leave blank to keep the current key.</small>
      </label>
    </fieldset>

    <fieldset>
      <legend>Compression</legend>
      <label>
        Strategy
        <select id="compression-mode" name="compression_mode" data-described-select="compression-description">
          <option value="perceptual-av1" data-description="Uses VMAF sampling to find an efficient SVT-AV1 encode that meets your quality target." {% if settings.compression_mode == "perceptual-av1" %}selected{% endif %}>Perceptual AV1 (recommended)</option>
          <option value="handbrake" data-description="Uses the selected HandBrake preset and encoder without perceptual quality targeting." {% if settings.compression_mode == "handbrake" %}selected{% endif %}>HandBrake</option>
        </select>
        <small id="compression-description"></small>
      </label>
      <label class="av1-setting">
        Video VMAF Target
        <input name="video_score" type="number" min="1" max="100" step="1" value="{{ settings.video_score }}" required>
        <small>95 is visually transparent for most footage. Lower values save more space; higher values take longer and may fail the savings requirement.</small>
      </label>
      <label class="av1-setting">
        Minimum Savings
        <input name="min_savings_percent" type="number" min="1" max="99" step="1" value="{{ settings.min_savings_percent }}" required>
        <small>Rejects an encode unless it saves at least this percentage. The AV1 search also uses this limit to avoid wasteful candidates.</small>
      </label>
      <label class="handbrake-setting">
        HandBrake Preset
        <select name="handbrake_preset" data-described-select="preset-description">
          <option value="" {% if not settings.handbrake_preset %}selected{% endif %} disabled>Choose a preset</option>
          {% for option in presets %}
          <option value="{{ option.value }}" data-description="{{ option.description }}" {% if settings.handbrake_preset == option.value %}selected{% endif %}>{{ option.value }}</option>
          {% endfor %}
        </select>
        <small id="preset-description">Controls the preset's quality, speed, audio, and container defaults.</small>
        {% if not presets %}<small class="error">No presets were reported by HandBrakeCLI.</small>{% endif %}
      </label>
      <label class="handbrake-setting">
        Video Encoder
        <select name="handbrake_encoder" data-described-select="encoder-description">
          <option value="" {% if not settings.handbrake_encoder %}selected{% endif %} disabled>Choose an encoder</option>
          {% for option in encoders %}
          <option value="{{ option.value }}" data-description="{{ option.description }}" {% if settings.handbrake_encoder == option.value %}selected{% endif %}>{{ option.value }}</option>
          {% endfor %}
        </select>
        <small id="encoder-description">Select CPU encoding or hardware encoding supported by this container.</small>
        {% if not encoders %}<small class="error">No encoders were reported by HandBrakeCLI.</small>{% endif %}
      </label>
      <label>
        Concurrent Jobs
        <input name="max_concurrent_jobs" type="number" min="1" max="8" step="1" value="{{ settings.max_concurrent_jobs }}" required>
        <small>Number of videos encoded at the same time. Higher values require more CPU, memory, and disk bandwidth. Applied after restarting the container.</small>
      </label>
      <label class="toggle-field handbrake-setting">
        <input name="upscale_to_4k" type="checkbox" value="true" {% if settings.upscale_to_4k %}checked{% endif %}>
        <span>Upscale smaller videos toward 4K</span>
        <small>Off preserves the source resolution. Enabling this increases processing time and usually increases file size.</small>
      </label>
    </fieldset>

    <fieldset>
      <legend>Workflow</legend>
      <label>
        Only Include Videos Taken Before
        <input id="video-taken-before-local" type="datetime-local">
        <input id="video-taken-before" name="video_taken_before" type="hidden" value="{{ settings.video_taken_before }}">
        <small>Optional. Excludes videos captured at or after this moment. Replacement assets uploaded by this app remain visible because their original capture time is preserved.</small>
      </label>
      <label>
        Mode
        <select name="replacement_mode" data-described-select="mode-description">
          <option value="review" data-description="Compress and wait for you to accept or reject the result." {% if settings.replacement_mode == "review" %}selected{% endif %}>Review - approve each result</option>
          <option value="auto" data-description="Upload the compressed copy and trash the original automatically." {% if settings.replacement_mode == "auto" %}selected{% endif %}>Auto - replace without review</option>
        </select>
        <small id="mode-description"></small>
      </label>
    </fieldset>

    <button type="submit">Save Settings</button>
  </form>
</section>
<script>
  document.querySelectorAll("[data-described-select]").forEach((select) => {
    const description = document.getElementById(select.dataset.describedSelect);
    const updateDescription = () => {
      description.textContent = select.selectedOptions[0]?.dataset.description || description.textContent;
    };
    select.addEventListener("change", updateDescription);
    updateDescription();
  });
  const cutoffLocal = document.getElementById("video-taken-before-local");
  const cutoffUtc = document.getElementById("video-taken-before");
  if (cutoffUtc.value) {
    const date = new Date(cutoffUtc.value);
    if (!Number.isNaN(date.getTime())) {
      const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      cutoffLocal.value = localDate.toISOString().slice(0, 16);
    }
  }
  document.querySelector(".settings-form").addEventListener("submit", () => {
    cutoffUtc.value = cutoffLocal.value ? new Date(cutoffLocal.value).toISOString() : "";
  });
  const compressionMode = document.getElementById("compression-mode");
  const updateCompressionFields = () => {
    const handbrake = compressionMode.value === "handbrake";
    document.querySelectorAll(".handbrake-setting").forEach((element) => {
      element.hidden = !handbrake;
      const select = element.querySelector("select");
      if (select) select.required = handbrake;
    });
    document.querySelectorAll(".av1-setting").forEach((element) => {
      element.hidden = handbrake;
    });
  };
  compressionMode.addEventListener("change", updateCompressionFields);
  updateCompressionFields();
</script>
{% endblock %}
