{% extends "base.html" %}
{% block content %}
<section>
  <h1>Settings</h1>
  {% if message %}<p class="notice">{{ message }}</p>{% endif %}
  <form method="post" class="settings-form">
    <label>
      Immich URL
      <input value="{{ settings.immich_url }}" disabled>
    </label>
    <label>
      API key
      <input value="{{ 'Configured' if settings.immich_api_key else 'Missing' }}" disabled>
    </label>
    <label>
      HandBrake preset
      <input name="handbrake_preset" value="{{ settings.handbrake_preset }}">
    </label>
    <label>
      HandBrake encoder
      <input name="handbrake_encoder" value="{{ settings.handbrake_encoder }}">
    </label>
    <label>
      Mode
      <select name="replacement_mode">
        <option value="review" {% if settings.replacement_mode == "review" %}selected{% endif %}>Review</option>
        <option value="auto" {% if settings.replacement_mode == "auto" %}selected{% endif %}>Auto</option>
      </select>
    </label>
    <button type="submit">Save Settings</button>
  </form>
</section>
{% endblock %}
