services:
  immich-compress:
    image: ghcr.io/zivshek/immich-compress:latest
    container_name: immich_compress
    restart: unless-stopped
    ports:
      - "8097:8097"
    environment:
      # Use a URL this container can reach, for example:
      # IMMICH_URL: "http://192.168.1.50:2283"
      IMMICH_URL: "http://YOUR-IMMICH-IP:2283"
      IMMICH_API_KEY: "${IMMICH_COMPRESS_API_KEY}"
      PROCESSED_SUFFIX: "-hbed"
      HANDBRAKE_PRESET: "Fast 2160p60 4K HEVC"
      HANDBRAKE_ENCODER: "nvenc_h265"
      DRY_RUN: "true"
      REPLACEMENT_MODE: "review"
    volumes:
      - /mnt/Apps/AppData/immich-compress:/data

    # NVIDIA NVENC: requires NVIDIA drivers and NVIDIA Container Toolkit on the host.
    # Uncomment this for Compose deployments that support the `gpus` key.
    # gpus: all

    # Intel QSV / VAAPI: uncomment and set HANDBRAKE_ENCODER to qsv_h265 or vaapi_h265.
    # devices:
    #   - /dev/dri:/dev/dri
